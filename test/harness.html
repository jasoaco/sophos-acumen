<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Coach Harness</title>
  <script>
    // ── Mock the chrome.* APIs so sidepanel.js runs outside the extension ──
    // Simulates an SE sitting on the Endpoint dashboard in Sophos Central.
    // ?route= overrides the simulated Central path (default: endpoint dashboard)
    const params = new URLSearchParams(location.search);
    const route = params.get("route") || "/manage/endpoint-protection/dashboard";
    const FAKE_SNAPSHOT = {
      url: "https://central.sophos.com" + route,
      title: "Sophos Central",
      route,
      headings: ["Dashboard", "Device Health"],
      actions: ["Scan Now", "View Devices", "Create Policy"],
      entities: ["DESKTOP-A1B2C3", "jsmith@contoso.com", "SRV-DC01"],
      rawTextSummary: "Central page view."
    };
    // Fake service-worker responses so the Inject tab populates in the harness.
    const FAKE_SCENARIOS = {
      builtIn: [
        { id: "ransomware", name: "Akira Ransomware", description: "CryptoGuard blocks Akira encryption; full attack chain with MITRE mapping." },
        { id: "mdr", name: "MDR Overnight Response", description: "MDR team detects and isolates a 2am ransomware attempt in 8 minutes." },
        { id: "xdr", name: "Multi-Stage Intrusion (XDR)", description: "Browser exploit → lateral movement → data staging across the estate." },
        { id: "healthy", name: "Healthy Environment", description: "Clean estate, health score 98, all endpoints green." },
      ],
      custom: [],
    };
    const FAKE_STATE = { enabled: false, scenario: "ransomware", customerName: "Contoso Healthcare", endpointCount: 2500, serverCount: 186, showBadge: true, interceptedCount: 0 };
    window.chrome = {
      tabs: {
        query: async () => [{ id: 1, windowId: 1, url: FAKE_SNAPSHOT.url }],
        onActivated: { addListener: () => {} },
        onUpdated: { addListener: () => {} },
        create: () => {}, reload: () => {},
      },
      scripting: {
        executeScript: async () => [{ result: FAKE_SNAPSHOT }],
      },
      runtime: {
        id: "harness",
        getURL: p => p,
        onMessage: { addListener: () => {} },
        sendMessage: (msg, cb) => {
          if (typeof cb !== "function") return;
          if (msg.type === "LIST_SCENARIOS") cb(FAKE_SCENARIOS);
          else if (msg.type === "GET_STATE") cb(FAKE_STATE);
          else cb({ ok: true });
        },
      },
      storage: { local: { get: async () => ({}), set: async () => {} } },
    };
  </script>
</head>
<body>
  <div id="mount"></div>
  <script>
    // Pull the real markup from sidepanel.html (single source of truth),
    // strip its <script> tags, mount the body, then load the real scripts.
    (async () => {
      const html = await (await fetch("../sidepanel.html")).text();
      const doc = new DOMParser().parseFromString(html, "text/html");
      // Move the <style> into our head
      doc.querySelectorAll("style").forEach(s => document.head.appendChild(s));
      // Mount body markup minus scripts
      doc.querySelectorAll("script").forEach(s => s.remove());
      document.getElementById("mount").innerHTML = doc.body.innerHTML;
      // Load products.js then sidepanel.js, in order
      const load = src => new Promise((res, rej) => {
        const el = document.createElement("script");
        el.src = src; el.onload = res; el.onerror = rej;
        document.body.appendChild(el);
      });
      await load("../data/products.js");
      await load("../data/central-content.js");
      await load("../sidepanel.js");
      const qp = new URLSearchParams(location.search);
      await new Promise(r => setTimeout(r, 600));
      // ?pick= selects a product in the manual picker (simulates the SE overriding detection)
      const pick = qp.get("pick");
      if (pick) {
        const sel = document.getElementById("product-select");
        sel.value = pick;
        sel.dispatchEvent(new Event("change"));
      }
      // ?hidetab= unchecks a visibility toggle (coach|inject|analyst) to test show/hide
      const hide = qp.get("hidetab");
      if (hide) {
        const cb = document.querySelector(`input[data-tabvis="${hide}"]`);
        if (cb) { cb.checked = false; cb.dispatchEvent(new Event("change")); }
      }
      // ?mode= clicks a top-level mode tab (coach|inject|analyst|settings)
      const mode = qp.get("mode");
      if (mode) document.querySelector(`.mode-tab[data-mode="${mode}"]`)?.click();
      // ?tab= clicks a coach tab after load (talk|discovery|objections|compete)
      const tab = qp.get("tab");
      if (tab) document.querySelector(`.coach-tab[data-tab="${tab}"]`)?.click();
    })();
  </script>
</body>
</html>
